# ============================================================
# KeyAuth SaaS —— Docker Compose 生产部署编排
# 包含：mysql / redis / server / admin / nginx / prometheus / grafana
# ============================================================
# 使用方式：
#   1. 复制 .env.example 为 .env，填入真实密钥
#   2. docker compose up -d
#   3. 首次启动后执行：bash scripts/reset_admin_password.sh
#   4. 监控栈可选：docker compose --profile monitoring up -d
# ============================================================

version: "3.9"

networks:
  keyauth-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  server-logs:
  admin-logs:
  prometheus-data:
  grafana-data:

services:
  # ---------- 数据库 ----------
  # v0.6.2：固定 MySQL 8.0.36 小版本，避免 8.0 → 8.0.40+ 的小版本漂移问题
  # （不同 8.0 小版本的默认参数、caching_sha2_password 行为可能略有差异）
  mysql:
    image: mysql:8.0.36
    container_name: keyauth-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-keyauth}
      MYSQL_USER: ${MYSQL_USER:-keyauth}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
      - --innodb_buffer_pool_size=512M
      - --slow_query_log=1
      - --long_query_time=2
    volumes:
      - mysql-data:/var/lib/mysql
      # 注：不再挂载 migrations 到 docker-entrypoint-initdb.d（v0.3.5 起改由 server 容器启动时执行）
      # 原挂载方式会按字母序执行所有 .sql（含 .down.sql），存在迁移顺序错误风险
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks: [keyauth-net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------- 缓存 ----------
  redis:
    image: redis:7-alpine
    container_name: keyauth-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass ${REDIS_PASSWORD}
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
      - --appendonly yes
      - --save 60 1000
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks: [keyauth-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------- 后端服务 ----------
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: keyauth/server:0.2.0
    container_name: keyauth-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 数据库（注意：后端 config.go 读取 MYSQL_* 环境变量，不能用 DB_*）
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-keyauth}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-keyauth}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # 必须从环境变量传入（铁律 04：敏感配置不进代码）
      # 注意：后端 config.go 读取的环境变量名为 APP_AES_KEY，必须 32 字节字符串
      APP_AES_KEY: ${AES_KEY}
      JWT_SECRET: ${JWT_SECRET}
      RSA_PRIVATE_KEY_PATH: /app/keys/rsa_private.pem
      RSA_PUBLIC_KEY_PATH: /app/keys/rsa_public.pem
      # 数据库迁移（v0.3.5：server 启动时自动执行 migrations 目录下 .up.sql）
      # v0.6.2：MIGRATION_REPAIR_DIRTY=true 允许 dirty 状态修复（默认 false，仅显式开启）
      MIGRATION_AUTO: "true"
      MIGRATION_DIR: /app/migrations
      MIGRATION_REPAIR_DIRTY: ${MIGRATION_REPAIR_DIRTY:-false}
      # 运行（容器内固定 8080，对外端口由 ports 映射控制）
      GIN_MODE: release
      TZ: Asia/Shanghai
    volumes:
      - server-logs:/app/logs
      - ./configs:/app/configs:ro
      - ./keys:/app/keys:ro
    ports:
      - "${SERVER_PORT:-8080}:8080"
    networks: [keyauth-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------- 前端 admin ----------
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    image: keyauth/admin:0.2.0
    container_name: keyauth-admin
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${ADMIN_PORT:-8081}:80"
    networks: [keyauth-net]
    volumes:
      - admin-logs:/var/log/nginx

  # ---------- 总入口 nginx（反向代理 + HTTPS） ----------
  # 仅生产环境启用，本地开发可直接访问 admin:8081 与 server:8080
  gateway:
    image: nginx:1.25-alpine
    container_name: keyauth-gateway
    restart: unless-stopped
    depends_on:
      - server
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - ./deploy/nginx/logs:/var/log/nginx
    networks: [keyauth-net]
    profiles: ["production"]

  # ---------- Prometheus 监控（可选，--profile monitoring 启用） ----------
  # v0.4.x Prometheus 指标采集
  # 抓取 server:8080/metrics，按 15s 周期采集
  # 默认不暴露端口（仅内网），生产环境可通过 nginx 反代 /prometheus/
  prometheus:
    image: prom/prometheus:latest
    container_name: keyauth-prometheus
    restart: unless-stopped
    depends_on:
      - server
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks: [keyauth-net]
    profiles: ["monitoring"]

  # ---------- Grafana 可视化（可选，--profile monitoring 启用） ----------
  # v0.4.x Grafana 仪表盘
  # 默认账号 admin/admin（首次登录强制改密），数据源自动配置指向 Prometheus
  grafana:
    image: grafana/grafana:latest
    container_name: keyauth-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks: [keyauth-net]
    profiles: ["monitoring"]
