# ============================================================
# KeyAuth SaaS —— Docker Compose 生产部署编排
# 包含：mysql / redis / server / admin / nginx
# ============================================================
# 使用方式：
#   1. 复制 .env.example 为 .env，填入真实密钥
#   2. docker compose up -d
#   3. 首次启动后执行：bash scripts/reset_admin_password.sh
# ============================================================

version: "3.9"

networks:
  keyauth-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  server-logs:
  admin-logs:

services:
  # ---------- 数据库 ----------
  mysql:
    image: mysql:8.0
    container_name: keyauth-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-keyauth}
      MYSQL_USER: ${MYSQL_USER:-keyauth}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
      - --innodb_buffer_pool_size=512M
      - --slow_query_log=1
      - --long_query_time=2
    volumes:
      - mysql-data:/var/lib/mysql
      - ./apps/server/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks: [keyauth-net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------- 缓存 ----------
  redis:
    image: redis:7-alpine
    container_name: keyauth-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass ${REDIS_PASSWORD}
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
      - --appendonly yes
      - --save 60 1000
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks: [keyauth-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------- 后端服务 ----------
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: keyauth/server:0.2.0
    container_name: keyauth-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 数据库
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-keyauth}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE:-keyauth}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # 必须从环境变量传入（铁律 04：敏感配置不进代码）
      AES_KEY: ${AES_KEY}
      JWT_SECRET: ${JWT_SECRET}
      RSA_PRIVATE_KEY_PATH: /app/keys/rsa_private.pem
      RSA_PUBLIC_KEY_PATH: /app/keys/rsa_public.pem
      # 运行
      SERVER_PORT: 8080
      GIN_MODE: release
      TZ: Asia/Shanghai
    volumes:
      - server-logs:/app/logs
      - ./configs:/app/configs:ro
      - ./keys:/app/keys:ro
    ports:
      - "${SERVER_PORT:-8080}:8080"
    networks: [keyauth-net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------- 前端 admin ----------
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    image: keyauth/admin:0.2.0
    container_name: keyauth-admin
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${ADMIN_PORT:-8081}:80"
    networks: [keyauth-net]
    volumes:
      - admin-logs:/var/log/nginx

  # ---------- 总入口 nginx（反向代理 + HTTPS） ----------
  # 仅生产环境启用，本地开发可直接访问 admin:8081 与 server:8080
  gateway:
    image: nginx:1.25-alpine
    container_name: keyauth-gateway
    restart: unless-stopped
    depends_on:
      - server
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - ./deploy/nginx/logs:/var/log/nginx
    networks: [keyauth-net]
    profiles: ["production"]
