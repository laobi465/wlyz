# ============================================================
# 总入口网关 nginx 配置
# 用法：profiles: ["production"]，仅在 docker compose --profile production up 时启用
# 域名/SSL 路径需根据实际环境修改（铁律 04：不硬编码域名）
# ============================================================

# 上游服务
upstream keyauth_server {
    server server:8080;
    keepalive 32;
}

upstream keyauth_admin {
    server admin:80;
    keepalive 16;
}

# HTTP -> HTTPS 跳转
server {
    listen 80;
    server_name _;
    # ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主入口
server {
    listen 443 ssl http2;
    server_name _;

    # SSL 证书路径（按实际域名替换）
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # 客户端 API（HMAC 签名）
    location /api/v1/client/ {
        proxy_pass http://keyauth_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # 管理后台 API
    location /api/v1/admin/ {
        proxy_pass http://keyauth_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 开发者 API
    location /api/v1/tenant/ {
        proxy_pass http://keyauth_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 代理 API
    location /api/v1/agent/ {
        proxy_pass http://keyauth_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 支付回调
    location /api/v1/pay/ {
        proxy_pass http://keyauth_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 公共资源（如公告、版本信息）
    location /api/v1/public/ {
        proxy_pass http://keyauth_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 健康检查
    location = /health {
        proxy_pass http://keyauth_server/health;
        access_log off;
    }

    # 后台前端（其余全部走 admin）
    location / {
        proxy_pass http://keyauth_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
