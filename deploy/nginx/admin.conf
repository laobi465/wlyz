# ============================================================
# admin 前端 nginx 配置
# 单页应用 + API 反向代理
# 关键：前端 axios baseURL = '/api/v1'（相对路径），
# 必须在此 nginx 反代 /api/v1 → http://server:8080/api/v1，
# 否则登录请求 404，点击登录按钮无反应
# ============================================================

# upstream 必须在 server 块外（http 块顶层），不能写在 server 内
# docker compose 网络中 server 容器名可直接解析为容器 IP
upstream keyauth_backend {
    server server:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_vary on;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============== API 反向代理（关键）==============
    # 前端所有 /api/v1/* 请求转发到后端 server 容器
    # 不带 /api/v1 前缀的路径仍走 SPA 路由
    location /api/v1/ {
        proxy_pass http://keyauth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # 长连接超时（登录/支付等可能慢）
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        # 文件上传场景（备份恢复等）
        client_max_body_size 100m;
    }

    # ============== 健康检查（直连后端）==============
    # /health 由后端 server 提供（GET /health 返回 {"status":"ok"}）
    location = /health {
        proxy_pass http://keyauth_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # SPA 路由：所有未命中静态文件 / API 的请求回落到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（hash 化的资源名）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # index.html 不缓存
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

