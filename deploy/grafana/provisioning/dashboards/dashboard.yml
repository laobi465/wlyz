# v0.4.x Grafana 仪表盘自动配置
# 从 /var/lib/grafana/dashboards/ 目录自动加载 JSON 仪表盘

apiVersion: 1

providers:
  - name: "KeyAuth SaaS"
    orgId: 1
    folder: "KeyAuth"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
